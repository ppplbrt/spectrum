<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Da fantasma a fenomeno — Storia semantica di spectrum</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #FAFAF8;
    color: #1a1a18;
    padding: 2rem 1.5rem 4rem;
    max-width: 820px;
    margin: 0 auto;
  }

  header { margin-bottom: 2rem; }
  h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: .35rem;
  }
  .subtitle {
    font-size: 13px;
    color: #888780;
    font-style: italic;
  }

  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

  .panel {
    margin-top: 1.5rem;
    background: #ffffff;
    border: 0.5px solid #dddbd2;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: none;
  }
  .panel.active { display: block; }
  .panel-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: .5rem; }
  .panel-year { font-size: 12px; color: #888780; }
  .panel-title { font-size: 15px; font-weight: 500; color: #1a1a18; }
  .panel-text { font-size: 13px; color: #5a5a56; line-height: 1.65; }
  .panel-quote {
    margin-top: .6rem; padding: .45rem .75rem;
    border-left: 2px solid #dddbd2;
    font-size: 12px; color: #888780;
    font-family: Georgia, serif;
    line-height: 1.5; font-style: italic;
  }
  .close-btn {
    float: right; font-size: 12px; color: #888780;
    cursor: pointer; background: none; border: none; padding: 2px 4px;
    font-family: inherit;
  }
  .close-btn:hover { color: #1a1a18; }

  footer {
    margin-top: 3rem;
    font-size: 11px;
    color: #B4B2A9;
    border-top: 0.5px solid #dddbd2;
    padding-top: 1rem;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #e8e6e0; }
    h1 { color: #e8e6e0; }
    .panel { background: #242420; border-color: #3a3a36; }
    .panel-title { color: #e8e6e0; }
    .panel-text { color: #aaa9a3; }
    .panel-quote { border-color: #3a3a36; color: #6a6a66; }
    footer { border-color: #3a3a36; }
  }
</style>
</head>
<body>

<header>
  <h1>Da fantasma a fenomeno</h1>
  <p class="subtitle">Storia semantica della parola <em>spectrum</em> &nbsp;·&nbsp; 45 a.C. – 1704</p>
</header>

<svg width="100%" viewBox="0 0 680 430" style="overflow: visible;">
<defs>
  <marker id="ax" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M1 1L7 4L1 7" fill="none" stroke="#B4B2A9" stroke-width="1.2" stroke-linecap="round"/>
  </marker>
</defs>

<line x1="72" y1="20" x2="72" y2="400" stroke="#B4B2A9" stroke-width="0.5" marker-end="url(#ax)"/>
<line x1="60" y1="388" x2="650" y2="388" stroke="#B4B2A9" stroke-width="0.5" marker-end="url(#ax)"/>
<text x="68" y="36" text-anchor="end" font-size="11" fill="#888780" font-family="inherit">naturale</text>
<text x="68" y="382" text-anchor="end" font-size="11" fill="#888780" font-family="inherit">soprannaturale</text>

<g font-size="10" fill="#888780" text-anchor="middle" font-family="inherit">
  <line x1="100" y1="386" x2="100" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="100" y="404">45 a.C.</text>
  <line x1="175" y1="386" x2="175" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="175" y="404">II–III sec.</text>
  <line x1="270" y1="386" x2="270" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="270" y="404">VII–VIII s.</text>
  <line x1="330" y1="386" x2="330" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="330" y="404">IX sec.</text>
  <line x1="390" y1="386" x2="390" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="390" y="404">1524</text>
  <line x1="430" y1="386" x2="430" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="430" y="404">1546</text>
  <line x1="470" y1="386" x2="470" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="470" y="404">1592</text>
  <line x1="510" y1="386" x2="510" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="510" y="404">1619</text>
  <line x1="555" y1="386" x2="555" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="555" y="404">1662</text>
  <line x1="610" y1="386" x2="610" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="610" y="404">1672</text>
</g>

<path d="
  M 100 110
  C 130 92, 152 77, 175 75
  C 208 72, 245 295, 270 330
  C 295 358, 315 205, 330 190
  C 355 172, 374 318, 390 310
  C 408 300, 420 108, 430 100
  C 447 90, 458 212, 470 205
  C 486 197, 498 113, 510 105
  C 530 94, 542 208, 555 200
  C 578 188, 598 82, 610 70
" fill="none" stroke="#AFA9EC" stroke-width="1.5"/>

<g onclick="show('cicerone')" style="cursor:pointer">
  <circle cx="100" cy="110" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="100" y="96" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Cicerone</text>
  <text x="100" y="86" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">45 a.C.</text>
</g>

<g onclick="show('venta')" style="cursor:pointer">
  <circle cx="175" cy="75" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="175" y="61" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Venta Icenorum</text>
  <text x="175" y="51" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">II–III sec.</text>
</g>

<g onclick="show('ebora')" style="cursor:pointer">
  <circle cx="270" cy="330" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="270" y="348" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Ebora</text>
  <text x="270" y="359" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">VII–VIII sec.</text>
</g>

<g onclick="show('lios')" style="cursor:pointer">
  <circle cx="330" cy="190" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="330" y="176" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Lios Monocus</text>
  <text x="330" y="167" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">IX sec.</text>
</g>

<g onclick="show('erasmo')" style="cursor:pointer">
  <circle cx="390" cy="310" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="390" y="328" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Erasmo</text>
  <text x="390" y="339" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">1508–1524</text>
</g>

<g onclick="show('mizauld')" style="cursor:pointer">
  <circle cx="430" cy="100" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="430" y="86" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Mizauld</text>
  <text x="430" y="77" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">1546</text>
</g>

<g onclick="show('emmel')" style="cursor:pointer">
  <circle cx="470" cy="205" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="481" y="201" text-anchor="start" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Emmel</text>
  <text x="481" y="212" text-anchor="start" font-size="9" fill="#534AB7" font-family="inherit">1592</text>
</g>

<g onclick="show('grassi')" style="cursor:pointer">
  <circle cx="510" cy="105" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="510" y="91" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Grassi</text>
  <text x="510" y="82" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">1619</text>
</g>

<g onclick="show('schott')" style="cursor:pointer">
  <circle cx="555" cy="200" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="566" y="196" text-anchor="start" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Schott</text>
  <text x="566" y="207" text-anchor="start" font-size="9" fill="#534AB7" font-family="inherit">1662</text>
</g>

<g onclick="show('newton')" style="cursor:pointer">
  <circle cx="610" cy="70" r="9" fill="#D3D1C7" stroke="#888780" stroke-width="1.2"/>
  <text x="610" y="56" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" font-family="inherit">Newton</text>
  <text x="610" y="47" text-anchor="middle" font-size="9" fill="#5F5E5A" font-family="inherit">1672–1704</text>
</g>

</svg>

<div class="panel" id="panel">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <div class="panel-meta">
    <span class="panel-year" id="p-year"></span>
    <span class="panel-title" id="p-title"></span>
  </div>
  <div class="panel-quote" id="p-quote" style="display:none"></div>
  <div class="panel-text" id="p-text"></div>
  <div class="panel-ref" id="p-ref" style="display:none"></div>
</div>

<footer>
  Visualizzazione interattiva &nbsp;·&nbsp; clicca su ogni nodo per aprire il pannello descrittivo
</footer>

<script>
const nodes = {
  cicerone: {
    year: "45 a.C.",
    title: "Cicerone e Cazio Insubre",
    text: "In due lettere contenute nell'Epistolarum ad Familiares, Cicerone deride Cazio Insubre che propone spectrum come traduzione degli εἴδωλα epicurei: pellicole che si staccano dagli oggetti e rendono possibile la percezione, strumenti fisici della visione. Il suffisso -trum è strumentale — aratrum, rutrum, rostrum.",
    quote: "mali verborum interpretes",
    ref: "*Ep. Fam.* XVI e XIX, 45 a.C."
  },
  venta: {
    year: "I–IV sec. d.C.",
    title: "Tabella defixionis, Venta Icenorum",
    text: "La tavoletta elenca oggetti rubati tra cui spectrum nel senso inequivocabile di 'specchio'. In questo testo la parola designa un oggetto fisico e tangibile — il più concreto di tutti i referenti del percorso.",
    quote: "",
    ref: "*Tabella defixionis*, Venta Icenorum, I–IV sec. d.C."
  },
  ebora: {
    year: "VII–VIII secolo",
    title: "Iscrizione di Ebora",
    text: "In questo testo spectrum è sinonimo esplicito di lemures — gli spiriti notturni del folklore romano. Il referente è radicalmente incorporeo e soprannaturale: entità che si annidano nell'oscurità e vanno scongiurate. Punto più basso del percorso.",
    quote: "nec lemoru(m) insidies expectaraque vana time",
    ref: "Iscrizione di Ebora (Évora), VII–VIII sec."
  },
  lios: {
    year: "IX secolo",
    title: "Lios Monocus, Libellulus Sacerdotalis",
    text: "Il testo usa spectra poli per designare le apparizioni luminose del cielo, contrapposti agli sceptra mundi — i domini terreni. In questo testo spectrum è un fenomeno luminoso celeste osservabile: non un fantasma, ma qualcosa che si vede nel cielo.",
    quote: "spectra poli / sceptra mundi",
    ref: "Lios Monocus, *Libellulus Sacerdotalis*, IX sec."
  },
  erasmo: {
    year: "1508–1524",
    title: "Erasmo da Rotterdam",
    text: "Negli Adagia spectrum rende φάντασμα — apparizione di un morto. Nella traduzione dei Vangeli sostituisce phantasma della Vulgata. Nel colloquio Exorcismus sive spectrum il referente è un'entità soprannaturale che spaventa e va esorcizzata.",
    quote: "Exorcismus sive spectrum",
    ref: "Erasmo, *Exorcismus sive spectrum*, 1524"
  },
  mizauld: {
    year: "1546",
    title: "Antoine Mizauld",
    text: "Nei Phaenomena spectrum designa fenomeni ignei atmosferici osservabili — comete, traiettorie luminose, impressioni di fuoco nell'aria. Il referente in questo testo è un evento fisico e celeste, non un'entità soprannaturale.",
    quote: "aeris ignita spectra alia opportunis temporibus",
    ref: "Mizauld, *Phaenomena*, 1546"
  },
  emmel: {
    year: "1592",
    title: "Helfrich Emmel",
    text: "La Sylva quinquelinguis registra spectrum come sinonimo simultaneo di lemures e di visum, senza gerarchie tra i due. Il testo propone entrambi i significati con pari dignità: il soprannaturale (lemures) e il percettivo-naturale (visum). Il nodo si colloca a metà esatta dell'asse.",
    quote: "lemures / visum",
    ref: "Emmel, *Sylva quinquelinguis*, 1592"
  },
  grassi: {
    year: "1619",
    title: "Orazio Grassi / Lotario Sarsi",
    text: "Nella Libra astronomica spectrum designa un'apparenza ottica priva di sostanza fisica — arcobaleni, corone, pareli, effetti di rifrazione. Grassi lo usa per negare che la cometa sia uno spectrum vano: la parola indica qui un fenomeno naturale misurabile, contrapposto a un corpo celeste reale.",
    quote: "Cometam nunquam vanum spectrum fuisse",
    ref: "Grassi, *Libra astronomica*, 1619"
  },
  schott: {
    year: "1662",
    title: "Gaspar Schott",
    text: "Il Liber II definisce spectrum come tutto ciò che si mostra agli occhi e alle orecchie degli uomini — naturale o soprannaturale, diurno o notturno. Il testo equipara esplicitamente le due categorie distinguendole (spectra naturalia / artificialia) senza privilegiarne una.",
    quote: "spectra naturalia / spectra artificialia",
    ref: "Schott, *Physica Curiosa*, II, 1662"
  },
  newton: {
    year: "1672–1704",
    title: "Isaac Newton",
    text: "Newton usa spectrum per l'immagine colorata prodotta dal prisma: fenomeno fisico riproducibile, misurabile, quantificabile. Nell'articolo del 1672 è sinonimo di phantome e image; nell'Opticks del 1704 compare come 'the Solar Image or Spectrum'. Il referente in questi testi è interamente naturale e strumentale.",
    quote: "the Solar Image or Spectrum",
    ref: "Newton, *Philosophical Transactions*, 80, 1672"
  }
};

function show(id) {
  const d = nodes[id];
  if (!d) return;
  document.getElementById('p-year').textContent = d.year;
  document.getElementById('p-title').textContent = d.title;
  document.getElementById('p-text').textContent = d.text;
  const q = document.getElementById('p-quote');
  if (d.quote) { q.textContent = d.quote; q.style.display = 'block'; }
  else { q.style.display = 'none'; }
  const r = document.getElementById('p-ref');
  if (d.ref) { r.textContent = d.ref; r.style.display = 'block'; }
  else { r.style.display = 'none'; }
  document.getElementById('panel').classList.add('active');
}

function closePanel() {
  document.getElementById('panel').classList.remove('active');
}
</script>

</body>
</html>
