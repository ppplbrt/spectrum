<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From ghost to phenomenon — Storia semantica di spectrum</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #FAFAF8;
    color: #1a1a18;
    padding: 2rem 1.5rem 4rem;
    max-width: 820px;
    margin: 0 auto;
  }

  header { margin-bottom: 2rem; }
  h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: .35rem;
  }
  .subtitle {
    font-size: 13px;
    color: #888780;
    font-style: italic;
  }

  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

  .panel {
    margin-top: 1.5rem;
    background: #ffffff;
    border: 0.5px solid #dddbd2;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: none;
  }
  .panel.active { display: block; }
  .panel-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: .5rem; }
  .panel-year { font-size: 12px; color: #888780; }
  .panel-title { font-size: 15px; font-weight: 500; color: #1a1a18; }
  .panel-text { font-size: 13px; color: #5a5a56; line-height: 1.65; }
  .panel-quote {
    margin-top: .6rem; padding: .45rem .75rem;
    border-left: 2px solid #dddbd2;
    font-size: 12px; color: #888780;
    font-family: Georgia, serif;
    line-height: 1.5; font-style: italic;
  }
  .close-btn {
    float: right; font-size: 12px; color: #888780;
    cursor: pointer; background: none; border: none; padding: 2px 4px;
    font-family: inherit;
  }
  .close-btn:hover { color: #1a1a18; }

  footer {
    margin-top: 3rem;
    font-size: 11px;
    color: #B4B2A9;
    border-top: 0.5px solid #dddbd2;
    padding-top: 1rem;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #e8e6e0; }
    h1 { color: #e8e6e0; }
    .panel { background: #242420; border-color: #3a3a36; }
    .panel-title { color: #e8e6e0; }
    .panel-text { color: #aaa9a3; }
    .panel-quote { border-color: #3a3a36; color: #6a6a66; }
    footer { border-color: #3a3a36; }
  }
</style>
</head>
<body>

<header>
  <h1>From ghost to phenomenon</h1>
  <p class="subtitle">Semantic history of the word <em>spectrum</em> &nbsp;·&nbsp; 45 a.C. – 1704</p>
</header>

<line x1="72" y1="20" x2="72" y2="400" stroke="#B4B2A9" stroke-width="0.5" marker-end="url(#ax)"/>

  <text x="470" y="404">1592</text>
  <line x1="510" y1="386" x2="510" y2="392" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="510" y="404">1619</text>

<path d="

  <circle cx="100" cy="110" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>

  <text x="100" y="86" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">45 a.C.</text>

<g onclick="show('venta')" style="cursor:pointer">
  <circle cx="175" cy="75" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>

  <circle cx="270" cy="330" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>

  <text x="270" y="359" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">VII–VIII sec.</text>

  <circle cx="330" cy="190" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>

<g onclick="show('erasmo')" style="cursor:pointer">
  <circle cx="390" cy="310" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="390" y="328" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489" font-family="inherit">Erasmo</text>
  <text x="390" y="339" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">1508–1524</text>

  <circle cx="430" cy="100" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>

  <text x="430" y="77" text-anchor="middle" font-size="9" fill="#534AB7" font-family="inherit">1546</text>
</g>

  <circle cx="470" cy="205" r="7" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>

  <text x="481" y="212" text-anchor="start" font-size="9" fill="#534AB7" font-family="inherit">1592</text>

  <circle cx="610" cy="70" r="9" fill="#D3D1C7" stroke="#888780" stroke-width="1.2"/>
  <text x="610" y="56" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" font-family="inherit">Newton</text>

</svg>

<div class="panel" id="panel">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <div class="panel-meta">
    <span class="panel-year" id="p-year"></span>
    <span class="panel-title" id="p-title"></span>
  </div>
  <div class="panel-quote" id="p-quote" style="display:none"></div>
  <div class="panel-text" id="p-text"></div>
  <div class="panel-ref" id="p-ref" style="display:none"></div>
</div>

<footer>
  Interactive visualisation · click each node to open the detail panel
</footer>

<script>
const nodes = {
  cicero: {
    year: "45 BC",
    title: "Cicero and Catius Insuber",
    text: "In two letters in the Epistolarum ad Familiares, Cicero mocks Catius Insuber for proposing spectrum as a translation of the Epicurean εἴδωλα: the finest films that peel off objects and make perception possible, physical instruments of vision. The suffix -trum is instrumental — aratrum, rutrum, rostrum.",
    quote: "mali verborum interpretes"
  },
  venta: {
    year: "1st–4th century AD",
    title: "Tabella defixionis, Venta Icenorum",
    text: "The tablet lists stolen objects, among which appears spectrum in the unambiguous sense of ‘mirror’. In this text the word denotes a physical, tangible object — the most concrete of all the referents in the trajectory.",
    quote: ""
  },
  ebora: {
    year: "7th–8th century",
    title: "Inscription of Ebora",
    text: "In this text spectrum is an explicit synonym for lemures — the nocturnal spirits of Roman folklore. The referent is radically incorporeal and supernatural: entities lurking in the dark that must be conjured away. The lowest point of the trajectory.",
    quote: "nec lemoru(m) insidies expectaraque vana time"
  },
  lios: {
    year: "9th century",
    title: "Lios Monocus, Libellulus Sacerdotalis",
    text: "The text uses spectra poli to denote the luminous apparitions of the sky, set against sceptra mundi — the dominions of the earth. In this text spectrum is an observable luminous celestial phenomenon: not a ghost, but something seen in the sky.",
    quote: "spectra poli / sceptra mundi"
  },
  erasmo: {
    year: "1508–1524",
    title: "Erasmus of Rotterdam",
    text: "In the Adagia spectrum renders φάντασμα — the apparition of a dead person. In his translation of the Gospels it replaces phantasma of the Vulgate. In the colloquy Exorcismus sive spectrum the referent is a supernatural entity that frightens and must be exorcised.",
    quote: "Exorcismus sive spectrum"
  },
  mizauld: {
    year: "1546",
    title: "Antoine Mizauld",
    text: "In the Phaenomena spectrum denotes observable fiery atmospheric phenomena — comets, luminous trajectories, impressions of fire in the air. The referent in this text is a physical and celestial event, not a supernatural entity.",
    quote: "aeris ignita spectra alia opportunis temporibus"
  },
  emmel: {
    year: "1592",
    title: "Helfrich Emmel",
    text: "The Sylva quinquelinguis registers spectrum as a simultaneous synonym of both lemures and visum, without ranking one above the other. The text offers both meanings with equal standing: the supernatural (lemures) and the perceptual-natural (visum). The node sits at the exact midpoint of the axis.",
    quote: "lemures / visum"
  },
  grassi: {
    year: "1619",
    title: "Orazio Grassi / Lotharius Sarsius",
    text: "In the Libra astronomica spectrum denotes an optical appearance lacking physical substance — rainbows, halos, parhelia, effects of refraction. Grassi uses it to deny that the comet is a vain spectrum: the word here indicates a measurable natural phenomenon, as opposed to a real celestial body.",
    quote: "Cometam nunquam vanum spectrum fuisse"
  },
  schott: {
    year: "1662",
    title: "Gaspar Schott",
    text: "Liber II defines spectrum as everything that presents itself to the eyes and ears of men — natural or supernatural, by day or by night. The text explicitly equates the two categories by distinguishing them (spectra naturalia / artificialia) without privileging either.",
    quote: "spectra naturalia / spectra artificialia"
  },
  newton: {
    year: "1672–1704",
    title: "Isaac Newton",
    text: "Newton uses spectrum for the coloured image produced by the prism: a physical phenomenon, reproducible, measurable, quantifiable. In the 1672 article it is a synonym for phantome and image; in the Opticks of 1704 it appears as ‘the Solar Image or Spectrum’. The referent in these texts is entirely natural and instrumental.",
    quote: "the Solar Image or Spectrum"
  }
};

function show(id) {
  const d = nodes[id];
  if (!d) return;
  document.getElementById('p-year').textContent = d.year;
  document.getElementById('p-title').textContent = d.title;
  document.getElementById('p-text').textContent = d.text;
  const q = document.getElementById('p-quote');
  if (d.quote) { q.textContent = d.quote; q.style.display = 'block'; }
  else { q.style.display = 'none'; }
  const r = document.getElementById('p-ref');
  if (d.ref) { r.textContent = d.ref; r.style.display = 'block'; }
  else { r.style.display = 'none'; }
  document.getElementById('panel').classList.add('active');
}

function closePanel() {
  document.getElementById('panel').classList.remove('active');
}
</script>

</body>
</html>
